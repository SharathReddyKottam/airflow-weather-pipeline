name: CI - Airflow Weather Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary

      - name: Validate DAG file syntax
        run: |
          python -c "import ast; ast.parse(open('dags/weather_dag.py').read()); print('DAG syntax OK')"

      - name: Check imports
        run: |
          python -c "import requests; import bs4; print('All imports OK')"